<h2>📐 整体架构布局 v2</h2>
<p class="subtitle">右侧铺满 · 圆形渲染/导出按钮</p>

<div class="mockup" style="margin-top: 24px;">
  <div style="display:flex;height:400px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);">

    <!-- 顶栏 -->
    <div style="position:absolute;top:0;left:0;right:0;height:36px;background:rgba(30,32,38,0.95);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 16px;z-index:10;border-radius:12px 12px 0 0;">
      <span style="color:#60A5FA;font-size:12px;font-weight:600;">🔌 Node Editor</span>
      <span style="flex:1"></span>
      <span style="color:#4B5563;font-size:10px;">状态: 3 个节点</span>
      <span style="width:1px;height:16px;background:rgba(255,255,255,0.06);margin:0 12px;"></span>
      <span style="color:#6B7280;font-size:10px;cursor:pointer;">📂</span>
      <span style="color:#6B7280;font-size:10px;margin-left:8px;cursor:pointer;">💾</span>
    </div>

    <!-- 左：无限画布 -->
    <div style="flex:1;background:#1A1C23;padding-top:36px;position:relative;">
      <div style="position:absolute;top:36px;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);background-size:40px 40px;"></div>

      <!-- 节点示例 -->
      <div style="position:absolute;top:80px;left:60px;background:rgba(30,33,40,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;width:180px;z-index:2;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#3B82F6;"></div>
          <span style="color:#E2E8F0;font-size:11px;font-weight:600;">🎨 色块</span>
          <span style="flex:1"></span>
          <div style="width:8px;height:8px;border-radius:50%;background:#10B981;"></div>
        </div>
        <div style="height:40px;background:#0071E3;border-radius:6px;"></div>
      </div>

      <svg style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;">
        <path d="M 240 130 C 270 130, 310 130, 340 130" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none"/>
      </svg>

      <div style="position:absolute;top:100px;left:340px;background:rgba(30,33,40,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;width:120px;z-index:2;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#3B82F6;"></div>
          <span style="color:#E2E8F0;font-size:11px;font-weight:600;">📤 输出</span>
          <span style="flex:1"></span>
          <div style="width:8px;height:8px;border-radius:50%;background:#F59E0B;"></div>
        </div>
        <div style="color:#4B5563;font-size:9px;">连接预览面板</div>
      </div>

      <div style="position:absolute;bottom:16px;left:16px;display:flex;gap:4px;z-index:2;">
        <div style="width:28px;height:28px;border-radius:6px;background:rgba(30,32,38,0.9);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:14px;cursor:pointer;">−</div>
        <div style="height:28px;padding:0 8px;border-radius:6px;background:rgba(30,32,38,0.9);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;color:#6B7280;font-size:10px;">100%</div>
        <div style="width:28px;height:28px;border-radius:6px;background:rgba(30,32,38,0.9);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:14px;cursor:pointer;">+</div>
      </div>
    </div>

    <!-- 可拖拽分隔线 -->
    <div style="width:4px;background:rgba(255,255,255,0.06);cursor:col-resize;display:flex;align-items:center;justify-content:center;transition:background 0.15s;">
      <div style="width:2px;height:32px;background:rgba(255,255,255,0.15);border-radius:2px;"></div>
    </div>

    <!-- 右：铺满的预览面板（无标题，只有圆形按钮） -->
    <div style="width:320px;background:#181A20;padding-top:36px;display:flex;flex-direction:column;position:relative;">

      <!-- 右上角圆形按钮组 -->
      <div style="position:absolute;top:42px;right:12px;z-index:5;display:flex;gap:8px;">
        <!-- 渲染按钮 - 圆形 -->
        <div style="width:40px;height:40px;border-radius:50%;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;" title="渲染">
          <span style="font-size:16px;">▶</span>
        </div>
        <!-- 导出按钮 - 圆形 -->
        <div style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;" title="导出">
          <span style="font-size:16px;">⬇</span>
        </div>
      </div>

      <!-- 预览内容 - 铺满整个右侧 -->
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;">
        <div style="text-align:center;">
          <div style="background:#0071E3;width:220px;height:90px;border-radius:12px;margin:0 auto 16px;box-shadow:0 8px 20px rgba(0,113,227,0.3);"></div>
          <div style="color:#E2E8F0;font-size:18px;font-weight:600;">iPhone 16 Pro</div>
          <div style="color:#6B7280;font-size:12px;margin:6px 0 16px;">A18 Pro · Apple 智能</div>
          <div style="display:inline-block;padding:8px 18px;background:#0071E3;color:white;border-radius:980px;font-size:12px;cursor:pointer;">进一步了解</div>
          <!-- Hover 态模拟 -->
          <div style="display:inline-block;padding:8px 18px;background:transparent;color:#2997FF;border:1px solid #2997FF;border-radius:980px;font-size:12px;margin-left:10px;cursor:pointer;">购买</div>
        </div>
      </div>

      <!-- 底部提示 -->
      <div style="height:24px;display:flex;align-items:center;justify-content:center;border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;">
        <span style="color:#374151;font-size:9px;">连接节点到「输出」即可预览</span>
      </div>
    </div>

  </div>
</div>
