<h2>🎨 节点 UI 风格</h2>
<p class="subtitle">统一外观 · ComfyUI 风格</p>

<div class="mockup" style="margin-top:24px;">
  <div style="display:flex;gap:40px;align-items:flex-start;justify-content:center;flex-wrap:wrap;">

    <!-- 色块节点示例 -->
    <div style="background:rgba(30,33,40,0.95);border:2px solid rgba(59,130,246,0.5);border-radius:12px;width:280px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.3);">

      <!-- 标题栏 -->
      <div style="background:rgba(59,130,246,0.15);padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.06);">
        <div style="width:10px;height:10px;border-radius:50%;background:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.2);"></div>
        <span style="color:#E2E8F0;font-size:12px;font-weight:600;">🎨 色块</span>
        <span style="flex:1"></span>
        <div style="width:10px;height:10px;border-radius:50%;background:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.2);"></div>
      </div>

      <!-- 参数区 -->
      <div style="padding:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="color:#6B7280;font-size:10px;width:50px;">色值</span>
          <div style="flex:1;display:flex;align-items:center;gap:6px;">
            <div style="width:24px;height:24px;border-radius:6px;background:#0071E3;border:2px solid rgba(255,255,255,0.1);"></div>
            <input type="text" value="#0071E3" style="flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:4px 6px;color:#E2E8F0;font-size:10px;font-family:monospace;outline:none;">
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="color:#6B7280;font-size:10px;width:50px;">宽度</span>
          <input type="range" value="80" style="flex:1;height:3px;">
          <span style="color:#9CA3AF;font-size:10px;min-width:35px;text-align:right;">320</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="color:#6B7280;font-size:10px;width:50px;">高度</span>
          <input type="range" value="60" style="flex:1;height:3px;">
          <span style="color:#9CA3AF;font-size:10px;min-width:35px;text-align:right;">120</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="color:#6B7280;font-size:10px;width:50px;">圆角</span>
          <input type="range" value="10" style="flex:1;height:3px;">
          <span style="color:#9CA3AF;font-size:10px;min-width:35px;text-align:right;">12</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="color:#6B7280;font-size:10px;width:50px;">不透明度</span>
          <input type="range" value="100" style="flex:1;height:3px;">
          <span style="color:#9CA3AF;font-size:10px;min-width:35px;text-align:right;">100%</span>
        </div>
      </div>

      <!-- 底部预览 -->
      <div style="padding:0 12px 12px;">
        <div style="height:40px;background:#0071E3;border-radius:8px;display:flex;align-items:center;justify-content:center;">
          <span style="color:rgba(255,255,255,0.7);font-size:8px;font-family:monospace;">#0071E3 · 320×120 · 圆角 12</span>
        </div>
      </div>

    </div>

    <!-- 标注 -->
    <div style="display:flex;flex-direction:column;gap:12px;max-width:300px;">
      <div class="card" style="padding:12px;">
        <h4>① 标题栏</h4>
        <p style="font-size:12px;color:#64748B;">左：输入端口（蓝色圆点）<br>中：图标 + 节点名称<br>右：输出端口（绿色圆点）</p>
      </div>
      <div class="card" style="padding:12px;">
        <h4>② 参数区</h4>
        <p style="font-size:12px;color:#64748B;">每行：标签 + 控件（颜色/滑块/输入框）+ 数值<br>所有控件都在节点上直接操作</p>
      </div>
      <div class="card" style="padding:12px;">
        <h4>③ 底部预览</h4>
        <p style="font-size:12px;color:#64748B;">实时显示节点输出效果<br>选中态：外框蓝色发光</p>
      </div>
    </div>

  </div>
</div>

<div class="section">
  <h3>这个节点外观你同意吗？</h3>
  <div class="options">
    <div class="option" data-choice="yes" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>✅ 同意</h3>
        <p>所有节点统一这个风格</p>
      </div>
    </div>
    <div class="option" data-choice="modify" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>🔄 修改</h3>
        <p>在终端告诉我</p>
      </div>
    </div>
  </div>
</div>
